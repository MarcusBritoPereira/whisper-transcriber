version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: upscribe-db
    environment:
      POSTGRES_DB: upscribe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: upscribe-redis
    ports:
      - "6381:6379"
    restart: always

  minio:
    image: minio/minio
    container_name: upscribe-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: always

volumes:
  pgdata:
  miniodata:
